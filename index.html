<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GULF CATERING HUB | فخامة الضيافة</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Playfair+Display:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #c5a059;
            --gold-light: #FFD700;
            --gold-dark: #8B6914;
            --black: #0a0500;
            --black-light: #1a0f05;
            --black-medium: #2a1a0a;
            --white: #ffffff;
            --gray-light: #f5f5f5;
            --gray: #aaa;
            --text-dark: #333;
            --text-light: #fff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--black);
            color: var(--text-light);
            overflow-x: hidden;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        body.en {
            direction: ltr;
            font-family: 'Cairo', 'Playfair Display', serif;
        }

        /* Splash Screen */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0500 0%, #1a0f05 50%, #0a0500 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        .splash-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .splash-logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            animation: pulse 1.5s infinite;
        }

        .splash-title {
            color: var(--gold);
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(197, 160, 89, 0.5);
            text-align: center;
            margin-top: 20px;
        }

        .splash-subtitle {
            color: var(--gold-light);
            font-size: 16px;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        .splash-loader {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(197, 160, 89, 0.2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 30px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Main Container */
        .main-container {
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            background-color: var(--black);
            min-height: 100vh;
        }

        /* Header */
        .header {
            position: relative;
            width: 100%;
            height: 100vh; /* افتراضي: ملء الشاشة بالكامل للموبايل */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        
        /* 🔥 التعديل المطلوب: على شاشات الكمبيوتر (أكبر من 992px) يصبح الارتفاع 50% فقط من الشاشة */
        @media (min-width: 992px) {
            .header {
                height: 50vh;
                min-height: 50vh;
            }
        }

        .header-video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        
        .header-bg-fallback {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1555244162-803834f70033?w=1920&q=80');
            background-size: cover;
            background-position: center;
            z-index: 0;
            filter: blur(1.5px);
            transform: scale(1.05);
        }

        .header-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.75) 0%, rgba(197,160,89,0.25) 50%, rgba(0,0,0,0.85) 100%);
            z-index: 1;
        }

        .header-content {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 100%;
            padding: 30px 20px;
            animation: fadeInUpBig 1s ease-out;
        }

        @keyframes fadeInUpBig {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .language-switcher {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        body.en .language-switcher {
            left: auto;
            right: 20px;
        }

        .lang-btn {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(197,160,89,0.5);
            color: var(--gold);
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
        }

        .lang-btn.active {
            background: var(--gold);
            color: var(--black);
            border-color: var(--gold);
        }

        .lang-btn:hover {
            background: var(--gold);
            color: var(--black);
            transform: scale(1.05);
        }

        /* Logo Section */
        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .brand-logo {
            width: 120px;
            height: 125px;
            object-fit: contain;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 20px rgba(197,160,89,0.5));
            transition: transform 0.3s ease;
        }

        .brand-logo:hover {
            transform: scale(1.05);
        }

        @media (min-width: 768px) {
            .brand-logo {
                width: 150px;
                height: 155px;
                margin-bottom: 20px;
            }
        }

        /* العنوان */
        .project-title {
            font-family: 'Playfair Display', 'Cairo', serif;
            font-size: 84px;
            font-weight: 800;
            letter-spacing: 6px;
            margin-bottom: 20px;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            color: #d4af37;
            text-shadow: 
                0 1px 0 rgba(255, 255, 255, 0.2),
                0 2px 0 #00000030,
                0 3px 0 #00000040,
                0 4px 0 #00000050,
                0 5px 0 #00000060,
                0 0 20px rgba(212, 175, 55, 0.6),
                0 0 40px rgba(212, 175, 55, 0.3),
                0 8px 12px rgba(0,0,0,0.4);
            background: linear-gradient(135deg, #d4af37 0%, #f5e6a0 30%, #d4af37 60%, #b8860b 100%);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .project-title::after {
            content: '';
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #d4af37, #f5e6a0, #d4af37, transparent);
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.7);
        }

        body.en .project-title {
            font-family: 'Playfair Display', serif;
            font-size: 84px;
            letter-spacing: 10px;
            background: linear-gradient(135deg, #d4af37 0%, #f5e6a0 30%, #d4af37 60%, #b8860b 100%);
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 
                0 1px 0 rgba(255, 255, 255, 0.2),
                0 2px 0 #00000030,
                0 3px 0 #00000040,
                0 4px 0 #00000050,
                0 5px 0 #00000060,
                0 0 20px rgba(212, 175, 55, 0.6),
                0 0 40px rgba(212, 175, 55, 0.3),
                0 8px 12px rgba(0,0,0,0.4);
        }

        body.en .project-title::after {
            width: 220px;
        }

        @media (max-width: 768px) {
            .project-title {
                font-size: 52px;
                letter-spacing: 4px;
                background: linear-gradient(135deg, #d4af37 0%, #f5e6a0 30%, #d4af37 60%, #b8860b 100%);
                -webkit-background-clip: text;
                background-clip: text;
                text-shadow: 
                    0 1px 0 rgba(255, 255, 255, 0.15),
                    0 2px 0 #00000030,
                    0 3px 0 #00000040,
                    0 4px 0 #00000050,
                    0 0 12px rgba(212, 175, 55, 0.5),
                    0 0 25px rgba(212, 175, 55, 0.25),
                    0 6px 12px rgba(0,0,0,0.4);
            }
            body.en .project-title {
                font-size: 52px;
                letter-spacing: 6px;
            }
            .project-title::after {
                width: 140px;
                bottom: -14px;
            }
            body.en .project-title::after {
                width: 170px;
            }
        }

        .brand-sub {
            color: var(--gold-light);
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 3px;
            margin-top: 20px;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        @media (min-width: 768px) {
            .brand-sub {
                font-size: 22px;
                letter-spacing: 4px;
                margin-top: 25px;
            }
        }

        .divider-line {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
            margin: 20px auto;
        }

        @media (min-width: 768px) {
            .divider-line {
                width: 120px;
                margin: 25px auto;
            }
        }

        .pulse-text {
            color: var(--gold-light);
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
            animation: pulseText 2s infinite;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 10px 25px;
            border-radius: 50px;
            margin-top: 15px;
        }

        @media (min-width: 768px) {
            .pulse-text {
                font-size: 20px;
                padding: 12px 35px;
            }
        }

        @keyframes pulseText {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        .scroll-down {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            cursor: pointer;
            animation: bounce 2s infinite;
            background: rgba(0,0,0,0.5);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            border: 1px solid var(--gold);
            transition: all 0.3s ease;
        }

        .scroll-down:hover {
            background: var(--gold);
            transform: translateX(-50%) scale(1.1);
        }

        .scroll-down svg {
            width: 24px;
            height: 24px;
            fill: var(--gold);
        }

        .scroll-down:hover svg {
            fill: var(--black);
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(10px); }
        }

        /* Content Area */
        .content-area {
            position: relative;
            background-image: url('https://images.pexels.com/photos/20551987/pexels-photo-20551987.jpeg?auto=compress&cs=tinysrgb&w=1200');
            background-size: cover;
            background-attachment: fixed;
            min-height: 400px;
            margin: 0;
            padding: 0;
        }

        .content-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(10,5,0,0.70) 0%, rgba(10,5,0,0.25) 50%, rgba(10,5,0,0.85) 100%);
            pointer-events: none;
        }

        .content-inner {
            position: relative;
            z-index: 1;
            padding: 20px 0;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            .content-inner {
                padding: 40px 20px;
            }
        }

        /* Question Cards */
        .questions-section {
            padding: 20px 15px;
            display: grid;
            gap: 15px;
        }

        @media (min-width: 768px) {
            .questions-section {
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                padding: 30px 40px;
                gap: 20px;
            }
        }

        .question-card {
            background: linear-gradient(135deg, rgba(26,15,5,0.96) 0%, rgba(42,26,10,0.96) 100%);
            border: 1px solid rgba(197,160,89,0.5);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .question-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(197,160,89,0.2);
        }

        .question-card:nth-child(1) { animation-delay: 0.1s; }
        .question-card:nth-child(2) { animation-delay: 0.2s; }
        .question-card:nth-child(3) { animation-delay: 0.3s; }
        .question-card:nth-child(4) { animation-delay: 0.4s; }
        .question-card:nth-child(5) { animation-delay: 0.5s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-icon {
            font-size: 40px;
            flex-shrink: 0;
            margin-top: 3px;
        }

        @media (min-width: 768px) {
            .question-icon {
                font-size: 50px;
            }
        }

        body.en .question-card {
            flex-direction: row-reverse;
        }

        .question-text {
            flex: 1;
        }

        .question-title {
            color: var(--gold-light);
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: right;
        }

        @media (min-width: 768px) {
            .question-title {
                font-size: 22px;
            }
        }

        body.en .question-title {
            text-align: left;
        }

        .question-desc {
            color: var(--white);
            font-size: 15px;
            line-height: 26px;
            text-align: right;
        }

        @media (min-width: 768px) {
            .question-desc {
                font-size: 16px;
                line-height: 28px;
            }
        }

        body.en .question-desc {
            text-align: left;
        }

        /* How It Works */
        .how-it-works {
            padding: 40px 15px;
        }

        @media (min-width: 768px) {
            .how-it-works {
                padding: 60px 40px;
            }
        }

        .section-title {
            font-size: 36px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 40px;
            color: var(--gold);
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        @media (min-width: 768px) {
            .section-title {
                font-size: 42px;
                margin-bottom: 50px;
            }
        }

        .steps-grid {
            display: grid;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .steps-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 25px;
            }
        }

        @media (min-width: 1024px) {
            .steps-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .step-card {
            margin: 0;
            border-radius: 24px;
            padding: 24px;
            animation: fadeInUp 0.8s ease forwards;
            opacity: 0;
        }

        .step-card:nth-child(2) { animation-delay: 0.1s; }
        .step-card:nth-child(3) { animation-delay: 0.2s; }
        .step-card:nth-child(4) { animation-delay: 0.3s; }

        .step-card.primary {
            background: linear-gradient(135deg, rgba(197,160,89,0.93) 0%, rgba(139,105,20,0.93) 50%, rgba(197,160,89,0.93) 100%);
            border: 2px solid var(--gold-light);
            box-shadow: 0 0 20px rgba(197,160,89,0.6);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .step-card.primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 40px rgba(197,160,89,0.8);
        }

        .step-card.secondary {
            background: linear-gradient(135deg, rgba(42,26,10,0.96) 0%, rgba(26,10,0,0.96) 100%);
            border: 1px solid rgba(197,160,89,0.5);
            transition: transform 0.3s ease;
        }

        .step-card.secondary:hover {
            transform: translateY(-3px);
        }

        .step-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 16px;
        }

        .step-card.primary .step-header {
            justify-content: center;
        }

        body.en .step-header {
            flex-direction: row-reverse;
        }

        .step-number {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .step-card.primary .step-number {
            width: 70px;
            height: 70px;
            background: var(--white);
            color: var(--gold);
            border: 2px solid var(--gold-light);
            font-size: 32px;
        }

        .step-card.secondary .step-number {
            background: var(--gold);
            color: var(--black);
        }

        .step-title {
            font-size: 24px;
            font-weight: 700;
            flex: 1;
            text-align: right;
        }

        body.en .step-title {
            text-align: left;
        }

        .step-card.primary .step-title {
            color: var(--white);
            font-size: 28px;
            text-shadow: 0 1px 1px #000, 0 0 5px rgba(0,0,0,0.5);
            text-align: center;
        }

        .step-card.secondary .step-title {
            color: var(--gold);
        }

        .step-desc {
            font-size: 16px;
            line-height: 28px;
            text-align: right;
        }

        body.en .step-desc {
            text-align: left;
        }

        .step-card.primary .step-desc {
            color: var(--white);
            font-size: 18px;
            line-height: 32px;
            text-align: center;
            font-weight: 600;
        }

        .step-card.secondary .step-desc {
            color: var(--white);
        }

        .step-cta {
            margin-top: 25px;
            text-align: center;
        }

        .cta-button {
            background: linear-gradient(90deg, var(--white), var(--gold-light));
            color: var(--gold-dark);
            padding: 14px 40px;
            border-radius: 40px;
            border: none;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .cta-button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255,215,0,0.4);
        }

        /* Why Us */
        .why-us-section {
            margin: 30px 15px;
            padding: 40px 30px;
            background: rgba(26, 15, 5, 0.94);
            border-radius: 30px;
            border: 1px solid rgba(197,160,89,0.5);
        }

        @media (min-width: 768px) {
            .why-us-section {
                margin: 40px;
                padding: 50px 40px;
            }
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (min-width: 640px) {
            .features-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .features-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        .feature-item {
            background: linear-gradient(135deg, rgba(58,37,16,0.96) 0%, rgba(42,26,10,0.96) 100%);
            border: 1px solid rgba(197,160,89,0.5);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            animation: fadeIn 0.6s ease forwards;
            opacity: 0;
            transition: transform 0.3s ease;
            height: 100%;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .feature-item:hover {
            transform: translateY(-5px);
        }

        .feature-item:nth-child(1) { animation-delay: 0.1s; }
        .feature-item:nth-child(2) { animation-delay: 0.15s; }
        .feature-item:nth-child(3) { animation-delay: 0.2s; }
        .feature-item:nth-child(4) { animation-delay: 0.25s; }
        .feature-item:nth-child(5) { animation-delay: 0.3s; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .feature-icon {
            font-size: 45px;
            margin-bottom: 15px;
        }

        @media (min-width: 768px) {
            .feature-icon {
                font-size: 55px;
            }
        }

        .feature-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 10px;
        }

        @media (min-width: 768px) {
            .feature-title {
                font-size: 22px;
            }
        }

        .feature-desc {
            font-size: 14px;
            color: var(--white);
            line-height: 1.5;
            word-wrap: break-word;
        }

        @media (min-width: 768px) {
            .feature-desc {
                font-size: 15px;
            }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 50px 20px;
            border-top: 1px solid rgba(197,160,89,0.2);
            background: rgba(10,5,0,0.85);
            margin-top: 20px;
        }

        .footer-logo {

                <div class="form-group"><label class="form-label">${t('name')} *</label><input class="form-input" placeholder="${t('namePlaceholder')}" value="${formData.fullName}" oninput="formData.fullName = this.value"></div>
                <div class="form-group"><label class="form-label">${t('eventTypeLabel')} *</label><div class="options-grid">${t('eventTypes').map(opt => `<button class="option-btn ${formData.eventType === opt ? 'selected' : ''}" onclick="selectEventType('${opt.replace(/'/g, "\\'")}')">${opt}</button>`).join('')}</div>${formData.eventType === other ? `<input class="form-input" placeholder="${t('eventTypeOtherPlaceholder')}" value="${formData.eventTypeOther}" oninput="formData.eventTypeOther = this.value" style="margin-top:10px">` : ''}</div>
                <div class="form-group"><label class="form-label">${t('eventDate')} *</label><div class="date-row"><div class="date-picker-btn ${formData.eventDate ? 'has-value' : ''}" onclick="openDatePicker()">${formData.eventDate || t('datePlaceholder')}</div><button class="determine-later-btn ${formData.eventDate === detLater ? 'active' : ''}" onclick="toggleDetermineLater()">${t('determineLater')}</button></div></div>
                <div class="form-group"><label class="form-label">${t('peopleCount')} *</label><div class="options-grid">${t('peopleCounts').map(opt => `<button class="option-btn ${formData.peopleCount === opt ? 'selected' : ''}" onclick="selectPeopleCount('${opt.replace(/'/g, "\\'")}')">${opt}</button>`).join('')}</div>${formData.peopleCount === other ? `<input class="form-input" placeholder="${t('peopleCountOtherPlaceholder')}" value="${formData.peopleCountOther}" oninput="formData.peopleCountOther = this.value" style="margin-top:10px">` : ''}</div>
                <div class="form-group"><label class="form-label">${t('buffetTime')} *</label><div class="options-grid">${t('buffetTimes').map(opt => `<button class="option-btn ${formData.buffetTime === opt ? 'selected' : ''}" onclick="formData.buffetTime = '${opt.replace(/'/g, "\\'")}'; renderModalForm()">${opt}</button>`).join('')}</div></div>
                <div class="form-group"><label class="form-label">${t('budget')} <span class="optional">${t('optional')}</span></label><input class="form-input" value="${formData.budget}" oninput="formData.budget = this.value"></div>
                <div class="form-group"><label class="form-label">${t('phone')} *</label><input class="form-input" placeholder="968XXXXXXXX" value="${formData.phoneNumber}" oninput="formData.phoneNumber = this.value"></div>
                <button class="submit-btn" onclick="handleSubmit()" ${loading ? 'disabled' : ''}>${loading ? '<span class="spinner"></span>' : t('send')}</button>
                <button class="cancel-btn" onclick="closeModal()">${t('cancel')}</button>
            `;
        }

        function selectEventType(opt) { formData.eventType = opt; formData.eventTypeOther = ''; renderModalForm(); }
        function selectPeopleCount(opt) { formData.peopleCount = opt; formData.peopleCountOther = ''; renderModalForm(); }
        function openDatePicker() { const d = document.getElementById('hiddenDateInput'); d.min = new Date().toISOString().split('T')[0]; d.showPicker ? d.showPicker() : d.click(); }
        function toggleDetermineLater() { const v = t('determineLaterValue'); formData.eventDate = formData.eventDate === v ? '' : v; renderModalForm(); }
        function showToast(msg, type = '') { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast show ' + type; setTimeout(() => t.classList.remove('show'), 4000); }
        function validatePhone(p) { return /^[+]?[0-9]{8,15}$/.test(p); }

        async function handleSubmit() {
            const other = t('other'), detLater = t('determineLaterValue');
            if (!formData.fullName.trim()) return showToast(t('nameRequired'), 'error');
            if (!formData.eventType) return showToast(t('eventRequired'), 'error');
            if (formData.eventType === other && !formData.eventTypeOther.trim()) return showToast(t('eventOtherRequired'), 'error');
            if (!formData.eventDate) return showToast(t('dateRequired'), 'error');
            if (formData.eventDate !== detLater && new Date(formData.eventDate) < new Date().setHours(0,0,0,0)) return showToast(t('pastDate'), 'error');
            if (!formData.peopleCount) return showToast(t('peopleRequired'), 'error');
            if (formData.peopleCount === other && !formData.peopleCountOther.trim()) return showToast(t('peopleOtherRequired'), 'error');
            if (!formData.buffetTime) return showToast(t('timeRequired'), 'error');
            if (!formData.phoneNumber.trim()) return showToast(t('phoneRequired'), 'error');
            if (!validatePhone(formData.phoneNumber.trim())) return showToast(t('phoneInvalid'), 'error');

            loading = true; renderModalForm();
            try {
                await db.collection('orders').add({
                    fullName: formData.fullName.trim(), eventType: formData.eventType === other ? formData.eventTypeOther.trim() : formData.eventType,
                    eventDate: formData.eventDate.trim(), peopleCount: formData.peopleCount === other ? formData.peopleCountOther.trim() : formData.peopleCount,
                    buffetTime: formData.buffetTime, budget: formData.budget.trim() || t('budgetNotSpecified'),
                    phoneNumber: formData.phoneNumber.trim(), status: 'جديد', createdAt: new Date().toISOString()
                });
                showToast(t('success'), 'success'); resetForm(); closeModal();
            } catch(e) { showToast(t('error'), 'error'); }
            finally { loading = false; renderModalForm(); }
        }

        document.getElementById('modalOverlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal(); });
    </script>
</body>
</html>
